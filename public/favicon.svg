<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo circular -->
  <circle cx="32" cy="32" r="32" fill="#0ea5e9"/>

  <!-- Panel solar (placas) -->
  <rect x="10" y="12" width="44" height="26" rx="3" fill="#1e3a5f"/>
  <!-- Grid lines horizontal -->
  <line x1="10" y1="21" x2="54" y2="21" stroke="#38bdf8" stroke-width="1"/>
  <line x1="10" y1="29" x2="54" y2="29" stroke="#38bdf8" stroke-width="1"/>
  <!-- Grid lines vertical -->
  <line x1="24" y1="12" x2="24" y2="38" stroke="#38bdf8" stroke-width="1"/>
  <line x1="39" y1="12" x2="39" y2="38" stroke="#38bdf8" stroke-width="1"/>
  <!-- Brillo solar -->
  <rect x="11" y="13" width="12" height="7" rx="1" fill="#60a5fa" opacity="0.4"/>

  <!-- Símbolo AC / copo de nieve -->
  <line x1="32" y1="44" x2="32" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="48" x2="40" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="48" x2="24" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Puntas copo -->
  <line x1="32" y1="44" x2="29" y2="47" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="35" y2="47" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="29" y2="55" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="35" y2="55" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
